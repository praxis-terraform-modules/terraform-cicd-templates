name: Makefile CI

on:
  workflow_call:
    inputs:
      terraform_version:
        description: 'Terraform version'
        type: string
        default: '1.8.0'
        required: false
      tflint_version:
        description: 'TFLint version'
        type: string
        default: 'latest'
        required: false
      make_target:
        description: 'Make target to run'
        type: string
        default: 'ci'
        required: false

jobs:
  make-ci:
    name: Make ${{ inputs.make_target }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: git clone --depth=1 https://github.com/${{ github.repository }}.git . && git checkout ${{ github.sha }}

      - name: Setup Terraform
        run: |
          curl -sSLo terraform.zip https://releases.hashicorp.com/terraform/${{ inputs.terraform_version }}/terraform_${{ inputs.terraform_version }}_linux_amd64.zip
          unzip -o terraform.zip
          sudo mv terraform /usr/local/bin/
          terraform version

      - name: Setup TFLint
        run: |
          curl -sSL https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --version

      - name: Setup terraform-docs
        run: |
          LATEST=$(curl -s https://api.github.com/repos/terraform-docs/terraform-docs/releases/latest | grep tag_name | cut -d '"' -f 4)
          curl -sSLo terraform-docs.tar.gz "https://github.com/terraform-docs/terraform-docs/releases/download/${LATEST}/terraform-docs-${LATEST}-linux-amd64.tar.gz"
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/

      - name: Setup Checkov
        run: pip install checkov

      - name: Setup Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run make ${{ inputs.make_target }}
        run: make ${{ inputs.make_target }}
