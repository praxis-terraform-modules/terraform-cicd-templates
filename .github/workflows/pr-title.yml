name: Validate PR Title

on:
  workflow_call:

jobs:
  validate-title:
    name: Validate PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            chore
            docs
            refactor
            ci
            test
          requireScope: false
          subjectPattern: ^.{10,100}$
          subjectPatternError: |
            PR title must be between 10-100 characters.
            Examples:
              fix: correct vpc cidr validation
              feat: add private subnet support
              feat!: rename input variables (breaking change)