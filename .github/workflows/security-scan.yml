name: Security Scan

on:
  workflow_call:
    inputs:
      terraform_version:
        description: 'Terraform version'
        type: string
        default: '1.6.0'
        required: false
      checkov_config:
        description: 'Path to checkov config file'
        type: string
        default: '.checkov.yml'
        required: false
      checkov_soft_fail:
        description: 'Soft fail on checkov errors'
        type: boolean
        default: false
        required: false
      trivy_severity:
        description: 'Trivy severity levels to fail on'
        type: string
        default: 'HIGH,CRITICAL'
        required: false
      skip_path:
        description: 'Comma-separated paths to skip'
        type: string
        default: 'examples,.external_modules'
        required: false

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          config_file: ${{ inputs.checkov_config }}
          quiet: true
          soft_fail: ${{ inputs.checkov_soft_fail }}
          skip_path: ${{ inputs.skip_path }}

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: ${{ inputs.trivy_severity }}
          exit-code: 1
          trivyignores: .trivyignore
