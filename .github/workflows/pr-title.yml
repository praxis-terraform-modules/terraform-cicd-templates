name: Validate PR Title

on:
  workflow_call:

jobs:
  validate-title:
    name: Validate PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title follows conventional commits
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $TITLE"

          if echo "$TITLE" | grep -qE "^(fix|feat|chore|docs|refactor|ci|test)(\(.+\))?(!)?: .{10,100}$"; then
            echo "✅ PR title is valid"
          else
            echo "❌ PR title must follow conventional commits format"
            echo ""
            echo "Pattern: type(optional-scope): description (10-100 chars)"
            echo ""
            echo "Examples:"
            echo "  fix: correct vpc cidr validation"
            echo "  feat: add private subnet support"
            echo "  feat!: rename input variables (breaking change)"
            exit 1
          fi
