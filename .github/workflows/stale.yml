name: Stale PRs

on:
  workflow_call:

jobs:
  stale:
    name: Mark stale PRs
    runs-on: ubuntu-latest

    steps:
      - name: Mark and close stale PRs
        run: |
          # Get open PRs
          PRS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open&sort=updated&direction=asc")

          echo "$PRS" | jq -c '.[]' | while read -r pr; do
            PR_NUMBER=$(echo "$pr" | jq -r '.number')
            UPDATED_AT=$(echo "$pr" | jq -r '.updated_at')
            LABELS=$(echo "$pr" | jq -r '[.labels[].name] | join(",")')

            # Skip exempt PRs
            if echo "$LABELS" | grep -qE "wip|do-not-close"; then
              echo "⏭ PR #$PR_NUMBER is exempt"
              continue
            fi

            DAYS_SINCE=$(( ($(date +%s) - $(date -d "$UPDATED_AT" +%s)) / 86400 ))

            if [ "$DAYS_SINCE" -ge 21 ] && echo "$LABELS" | grep -q "stale"; then
              echo "🔒 Closing PR #$PR_NUMBER (stale for 21+ days)"
              curl -s -X PATCH \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" \
                -d '{"state":"closed"}'
              curl -s -X POST \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
                -d '{"body":"Closing due to inactivity. Feel free to reopen if you want to continue."}'
            elif [ "$DAYS_SINCE" -ge 14 ]; then
              echo "⚠️ Marking PR #$PR_NUMBER as stale ($DAYS_SINCE days)"
              curl -s -X POST \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/labels" \
                -d '["stale"]'
              curl -s -X POST \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
                -d '{"body":"This PR has had no activity for 14 days. Please update it or it will be closed in 7 days."}'
            else
              echo "✅ PR #$PR_NUMBER is active ($DAYS_SINCE days)"
            fi
          done
